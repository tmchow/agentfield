name: Coverage Summary

on:
  pull_request:
    paths:
      - "control-plane/**"
      - "sdk/**"
      - "scripts/test-all.sh"
      - "scripts/coverage-summary.sh"
      - "scripts/coverage-gate.py"
      - "scripts/patch-coverage-gate.sh"
      - ".coverage-gate.toml"
      - "coverage-baseline.json"
      - ".github/workflows/coverage.yml"
      - "docs/COVERAGE.md"
      - "docs/DEVELOPMENT.md"
      - ".github/BRANCH_PROTECTION.md"
  push:
    branches: [main]
    paths:
      - "control-plane/**"
      - "sdk/**"
      - "scripts/test-all.sh"
      - "scripts/coverage-summary.sh"
      - "scripts/coverage-gate.py"
      - "scripts/patch-coverage-gate.sh"
      - ".coverage-gate.toml"
      - "coverage-baseline.json"
      - ".github/workflows/coverage.yml"
      - "docs/COVERAGE.md"
      - "docs/DEVELOPMENT.md"
      - ".github/BRANCH_PROTECTION.md"
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: coverage-${{ github.ref }}
  cancel-in-progress: true

jobs:
  coverage-summary:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Full history + the PR base so `diff-cover` can compute patch
          # coverage against origin/main.
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25.x"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Python SDK test dependencies
        working-directory: sdk/python
        run: |
          python -m pip install --upgrade pip
          pip install .[dev]

      - name: Install diff-cover (for per-PR patch coverage)
        run: python -m pip install "diff-cover>=9.0.0"

      - name: Install TypeScript SDK dependencies
        working-directory: sdk/typescript
        run: npm ci
        env:
          CI: true

      - name: Install control plane web UI dependencies
        working-directory: control-plane/web/client
        run: npm ci
        env:
          CI: true

      - name: Generate coverage summary
        run: ./scripts/coverage-summary.sh

      - name: Publish coverage summary
        run: cat test-reports/coverage/summary.md >> "$GITHUB_STEP_SUMMARY"

      - name: Run coverage gate
        id: gate
        # Thresholds live in .coverage-gate.toml at the repo root so they
        # stay in-version-control and are the single source of truth for
        # both local runs and CI.
        run: |
          ./scripts/coverage-gate.py \
            --summary  test-reports/coverage/summary.json \
            --baseline coverage-baseline.json \
            --config   .coverage-gate.toml
        continue-on-error: true

      - name: Run patch coverage gate (diff-cover)
        id: patch_gate
        # Enforces .coverage-gate.toml:thresholds.min_patch on lines the PR
        # actually touches, against origin/main. This is the single most
        # effective regression signal — aggregates drift slowly, but new
        # untested code shows up here immediately. Output is posted as a
        # second sticky PR comment so reviewers see exactly which files
        # regressed patch coverage.
        if: github.event_name == 'pull_request'
        run: |
          ./scripts/patch-coverage-gate.sh
        continue-on-error: true

      - name: Upload coverage artifacts
        uses: actions/upload-artifact@v4
        with:
          name: coverage-summary
          path: test-reports/coverage/
          retention-days: 7

      - name: Comment coverage report on PR
        if: github.event_name == 'pull_request'
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: coverage-gate
          path: test-reports/coverage/gate-report.md

      - name: Comment patch coverage report on PR
        if: github.event_name == 'pull_request' && hashFiles('test-reports/coverage/patch-gate-report.md') != ''
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: patch-coverage-gate
          path: test-reports/coverage/patch-gate-report.md

      - name: Fail the job if any gate failed
        if: steps.gate.outcome == 'failure' || steps.patch_gate.outcome == 'failure'
        run: |
          echo "::error::Coverage gate failed. See the coverage report comment(s) on the PR for details and remediation steps."
          exit 1

      - name: Update coverage badge gist
        # NOTE: GitHub Actions does not allow `secrets.*` inside `if:` expressions
        # (they evaluate to empty). We surface them through `env` and gate on that
        # so the step silently skips on forks / PRs without the secret configured.
        if: github.event_name == 'push' && github.ref == 'refs/heads/main' && env.COVERAGE_GIST_ID != '' && env.GIST_TOKEN != ''
        uses: actions/github-script@v7
        env:
          COVERAGE_GIST_ID: ${{ secrets.COVERAGE_GIST_ID }}
          GIST_TOKEN: ${{ secrets.GIST_TOKEN }}
        with:
          github-token: ${{ secrets.GIST_TOKEN }}
          script: |
            const fs = require('fs');
            const badge = fs.readFileSync('test-reports/coverage/badge.json', 'utf8');
            const summary = fs.readFileSync('test-reports/coverage/summary.json', 'utf8');

            await github.rest.gists.update({
              gist_id: process.env.COVERAGE_GIST_ID,
              files: {
                'badge.json': { content: badge },
                'coverage-summary.json': { content: summary },
              },
            });
